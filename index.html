<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCMS - Your Voice. Your City. Your Solution.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="main-container">
        <div class="content-wrapper">
            <!-- Header/Navigation -->
            <header class="header">
                <div class="logo-section">
                    <img src="remove the background.png" alt="CCMS Logo" class="logo">
                    <p class="tagline">Your Voice. Your City. Your Solution.</p>
                </div>

                <nav class="navigation">
                    <ul class="nav-list">
                        <li><a href="index.html" class="nav-link active">Home</a></li>
                        <li><a href="about.html" class="nav-link">About Us</a></li>
                        <li><a href="services.html" class="nav-link">Services</a></li>
                        <li><a href="how-it-works.html" class="nav-link">How It Work?</a></li>
                        <li><a href="why-use-ccms.html" class="nav-link">Why Use CCMS?</a></li>
                    </ul>
                </nav>

                <div class="auth-buttons">
                    <button class="btn btn-login">
                        <span>LOGIN</span>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16,17 21,12 16,7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                    <button class="btn btn-register">
                        <span>REGISTRATION</span>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22,2 15,22 11,13 2,9 22,2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Hero Section -->
            <section class="hero-section">
                <!-- Left Content -->
                <div class="hero-left">
                    <div class="gradient-circle"></div>
                    <div class="hero-content">
                        <h1 class="hero-title">
                            Your Voice,<br>
                            Our Action
                        </h1>
                        <p class="hero-description">
                            Report Local Issues Like Power, Water, Roads, And More – Get
                            Timely Solutions From Your Municipality.
                        </p>
                    </div>
                </div>

                <!-- Right Content - Illustration -->
                <div class="hero-right">
                    <div class="ellipse-bg">
                        <img src="public/ellipse-3.svg" alt="Background Ellipse">
                    </div>
                    
                    <div class="illustration-container">
                        <!-- Decorative elements -->
                        <img src="public/twisted-leaf.svg" alt="Twisted leaf" class="decoration decoration-1">
                        <img src="public/fill-16.svg" alt="Decorative element" class="decoration decoration-2">
                        <img src="public/leaf.svg" alt="Leaf" class="decoration decoration-3">
                        <img src="public/fill-10.svg" alt="Decorative element" class="decoration decoration-4">
                        <img src="public/leave-the-leaf-.svg" alt="Leaf element" class="decoration decoration-5">

                        <!-- App screens -->
                        <div class="app-screen app-screen-1">
                            <div class="screen-header">
                                <img src="public/camera.png" alt="Camera" class="camera-icon">
                            </div>
                            <div class="screen-content">
                                <div class="content-item content-item-1">
                                    <img src="public/clip-path-group-1.png" alt="Screen content">
                                    <img src="public/touch-2.svg" alt="Avatar" class="avatar">
                                </div>
                                <div class="content-item content-item-2">
                                    <img src="public/clip-path-group-2.png" alt="Screen content">
                                    <img src="public/touch-2.svg" alt="Avatar" class="avatar">
                                </div>
                                <div class="content-item content-item-3">
                                    <img src="public/clip-path-group-3.png" alt="Screen content">
                                    <img src="public/touch-2.svg" alt="Avatar" class="avatar">
                                </div>
                                <div class="content-item content-item-4">
                                    <img src="public/clip-path-group-4.png" alt="Screen content">
                                    <img src="public/touch-2.svg" alt="Avatar" class="avatar">
                                </div>
                            </div>
                            <img src="public/touch-2.svg" alt="Touch icon" class="touch-icon">
                        </div>

                        <!-- Second app screen -->
                        <div class="app-screen app-screen-2">
                            <div class="screen-header-2">
                                <img src="public/buttons.png" alt="Buttons">
                            </div>
                            
                            <div class="profile-section">
                                <img src="public/profile-info.png" alt="Profile info">
                            </div>

                            <div class="rows-section">
                                <img src="public/rows-3.png" alt="Rows">
                            </div>

                            <div class="main-content">
                                <div class="content-row content-row-1">
                                    <img src="public/clip-path-group-9.png" alt="Content">
                                    <img src="public/check-3.png" alt="Check" class="check-icon">
                                </div>
                                <div class="content-row content-row-2">
                                    <img src="public/clip-path-group-10.png" alt="Content">
                                    <img src="public/check-4.png" alt="Check" class="check-icon">
                                </div>
                                <div class="content-row content-row-3">
                                    <img src="public/clip-path-group-11.png" alt="Content">
                                    <img src="public/check-5.png" alt="Check" class="check-icon">
                                </div>
                                <div class="content-row content-row-4">
                                    <img src="public/clip-path-group-12.png" alt="Content">
                                    <img src="public/check-6.png" alt="Check" class="check-icon">
                                </div>
                                <div class="content-row content-row-5">
                                    <img src="public/clip-path-group-13.png" alt="Content">
                                    <img src="public/check-7.png" alt="Check" class="check-icon">
                                </div>
                                <div class="content-row content-row-6">
                                    <img src="public/clip-path-group-14.png" alt="Content">
                                    <img src="public/check-8.png" alt="Check" class="check-icon">
                                </div>
                            </div>
                        </div>

                        <!-- Charts and decorative elements -->
                        <img src="public/fill-1.svg" alt="Decorative element" class="decoration decoration-6">
                        <img src="public/fill-20.svg" alt="Decorative element" class="decoration decoration-7">
                        <img src="public/plant.png" alt="Plant" class="decoration decoration-8">
                        <img src="public/pie-chart.png" alt="Pie chart" class="decoration decoration-9">
                        <img src="public/chart.png" alt="Chart" class="decoration decoration-10">
                        <img src="public/graph.png" alt="Graph" class="decoration decoration-11">
                        <img src="public/chart-2.png" alt="Chart" class="decoration decoration-12">

                        <!-- People illustrations -->
                        <div class="people-container">
                            <!-- Person sitting -->
                            <div class="person person-sitting">
                                <div class="person-head">
                                    <img src="public/head-2.png" alt="Head">
                                    <img src="public/hair.svg" alt="Hair" class="hair">
                                </div>
                                <img src="public/body-long-sleeve-1.png" alt="Body" class="person-body">
                                <div class="person-lower">
                                    <img src="public/seat-2.png" alt="Seat" class="seat">
                                    <img src="public/skin.svg" alt="Skin" class="skin">
                                    <img src="public/leglower.svg" alt="Leg" class="leg">
                                    <img src="public/right-shoe.png" alt="Shoe" class="shoe-1">
                                    <img src="public/right-shoe-2.png" alt="Shoe" class="shoe-2">
                                    <img src="public/leg-and-butt.svg" alt="Leg and body" class="leg-body">
                                </div>
                            </div>

                            <!-- Person standing -->
                            <div class="person person-standing">
                                <div class="person-head-2">
                                    <img src="public/head-5.png" alt="Head">
                                    <img src="public/hair-2.svg" alt="Hair" class="hair-2">
                                </div>
                                <img src="public/body.png" alt="Body" class="person-body-2">
                                <div class="person-legs">
                                    <img src="public/leg.svg" alt="Leg" class="leg-1">
                                    <img src="public/leg-2.svg" alt="Leg" class="leg-2">
                                    <img src="public/left-shoe.png" alt="Shoe" class="shoe-left">
                                    <img src="public/right-shoe-3.png" alt="Shoe" class="shoe-right">
                                    <img src="public/bottom-3.svg" alt="Bottom" class="bottom-1">
                                    <img src="public/bottom-4.svg" alt="Bottom" class="bottom-2">
                                </div>
                            </div>
                        </div>

                        <!-- Background image -->
                        <img src="public/clip-path-group.png" alt="Background" class="background-image">
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
